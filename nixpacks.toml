# Railway Nixpacks config — installs all open source QA tools
[phases.setup]
nixPkgs = [
  # Runtime
  "nodejs_20", "python3", "gcc", "gnumake", "pkg-config",
  # Perl (for Nikto)
  "perl", "perlPackages.LWP", "perlPackages.LWPProtocolHttps", "perlPackages.NetSSLeay",
  # Test Automation
  "k6",                           # Performance: k6 load testing binary
  "semgrep",                      # Security SAST: semgrep static analysis
  "trivy",                        # Security SCA: trivy CVE scanner
  "nikto",                        # Security DAST: nikto web scanner
]

[phases.install]
cmds = [
  # Install all deps including devDeps (vite needed for frontend build)
  "npm ci",
  # Install artillery separately (devDep but needed at runtime for test runner)
  "npm install --no-save artillery@latest 2>/dev/null || true",
  # Python open source tools
  "pip3 install --quiet --break-system-packages locust robotframework selenium pytest pytest-json-report 2>/dev/null || pip3 install --quiet locust robotframework selenium pytest pytest-json-report 2>/dev/null || true",
  # Create symlinks in /usr/local/bin for tools installed by Nix profile (so resolveBin fallback also works)
  "ln -sf $(which k6 2>/dev/null) /usr/local/bin/k6 2>/dev/null || true",
  "ln -sf $(which trivy 2>/dev/null) /usr/local/bin/trivy 2>/dev/null || true",
  "ln -sf $(which semgrep 2>/dev/null) /usr/local/bin/semgrep 2>/dev/null || true",
  # Install Playwright chromium browser
  "node_modules/.bin/playwright install chromium --with-deps 2>/dev/null || true",
  # Pre-download Trivy DB to avoid first-run delay
  "trivy image --download-db-only 2>/dev/null || true",
  # Install esbuild explicitly as a production dep so it is available in build phase
  "npm install --no-save esbuild@latest",
]

[phases.build]
cmds = [
  # 0. Ensure esbuild is available in build phase
  "npm install --no-save esbuild@latest 2>/dev/null || true",
  # 1. Build the React frontend with Vite
  "NODE_OPTIONS='--max-old-space-size=4096' node_modules/.bin/vite build 2>&1 || true",
  # 2. Copy the new bundle to the known stable filename so dist/index.html always works
  "NEW_BUNDLE=$(grep -o 'index-[A-Za-z0-9]*.js' dist/index.html | head -1) && if [ -n \"$NEW_BUNDLE\" ] && [ \"$NEW_BUNDLE\" != 'index-BeC3Jw2I.js' ]; then cp dist/assets/$NEW_BUNDLE dist/assets/index-BeC3Jw2I.js && sed -i \"s/$NEW_BUNDLE/index-BeC3Jw2I.js/g\" dist/index.html && echo \"Renamed $NEW_BUNDLE to index-BeC3Jw2I.js\"; else echo \"Bundle already index-BeC3Jw2I.js\"; fi",
  # 3. Build the server bundle
  "if [ -f dist/server.cjs ]; then echo 'Using pre-built dist/server.cjs'; else npx --yes esbuild server.ts --bundle --platform=node --target=node18 --format=cjs --outfile=dist/server.cjs --external:better-sqlite3 --external:bcrypt --external:bcryptjs --external:playwright --external:sharp --external:vite --external:@vite --external:tsx; fi",
  "echo 'Build complete:' && ls -lh dist/server.cjs dist/index.html",
]

[start]
cmd = "mkdir -p data && node dist/server.cjs"
